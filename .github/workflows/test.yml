name: Test

on:
  push:
    paths-ignore:
      - "README.md"
      - ".vscode/**"
      - "main.pdf"
      - "data/graduate-info.tex"
      - "data/ungraduate-info.tex"
  pull_request:
    paths-ignore:
      - "README.md"
      - ".vscode/**"
      - "main.pdf"
      - "data/graduate-info.tex"
      - "data/ungraduate-info.tex"
  workflow_dispatch:

env:
  CORE_PKGS: scheme-basic collection-latex collection-latexrecommended collection-latexextra
  XECJK_PKGS: collection-xetex collection-langchinese xecjk ulem
  BIB_PKGS: biblatex biblatex-gb7714-2015 biber
  BIN_PKGS: latexmk l3build
  REQUIRED_PKGS: >-
    algorithmicx algorithms appendix bookmark catchfile enumitem fancyhdr fancyref
    float ifplatform koma-script makecell multirow nomencl ntheorem pdfpages
    pgf ragged2e setspace silence texlive-scripts-extra titlesec
    xcolor xkeyval xstring
  FONT_PKGS: fandol tex-gyre dejavu

jobs:

  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >-
            ${{ env.CORE_PKGS }} ${{ env.XECJK_PKGS }} ${{ env.BIB_PKGS }}
            ${{ env.REQUIRED_PKGS }} ${{ env.FONT_PKGS }}
            ${{ env.BIN_PKGS }}
          texlive_version: 2026

      - name: Build document
        run: make

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: nwputhesis-pdf
          path: main.pdf
          retention-days: 30

  test:
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: >-
            ${{ env.CORE_PKGS }} ${{ env.XECJK_PKGS }} ${{ env.BIB_PKGS }}
            ${{ env.REQUIRED_PKGS }} ${{ env.FONT_PKGS }}
            ${{ env.BIN_PKGS }}
          texlive_version: 2026

      - name: Build document
        run: make test

      - name: Upload test results if failed
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-result-${{ matrix.os }}
          path: |
            build/test
            build/test-testfiles
